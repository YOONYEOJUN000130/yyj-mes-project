<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>병목 분석 대시보드</title>
</head>
<body>
<h1>병목 분석 대시보드</h1>

<a href="/">홈으로</a>
<a href="/production-records">생산 실적 목록</a>
<a href="/plc-events">PLC 이벤트 목록</a>

<section>
  <h2>현재 병목 공정</h2>

  <p th:if="${bottleneck == null}">
    분석할 생산 실적 데이터가 없습니다.
  </p>

  <p th:if="${bottleneck != null}">
    <strong th:text="${bottleneck.processCode}">B</strong>
    공정이 현재 병목 공정입니다.
    시간당 처리량:
    <strong th:text="${bottleneck.throughputPerHour}">75.0</strong>
    개/시간
  </p>
</section>

<section>
  <h2>공정별 분석 결과</h2>

  <table border="1">
    <thead>
    <tr>
      <th>공정</th>
      <th>데이터 수</th>
      <th>평균 사이클타임초</th>
      <th>시간당 처리량</th>
      <th>병목 여부</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="result : ${results}">
      <td th:text="${result.processCode}">A</td>
      <td th:text="${result.recordCount}">1</td>
      <td th:text="${result.averageCycleTimeSeconds}">24.5</td>
      <td th:text="${result.throughputPerHour}">146.9</td>
      <td th:text="${result.bottleneck ? '병목' : '-'}">-</td>
    </tr>
    <tr th:if="${results.isEmpty()}">
      <td colspan="5">분석할 생산 실적 데이터가 없습니다.</td>
    </tr>
    </tbody>
  </table>
</section>
</body>
</html>
