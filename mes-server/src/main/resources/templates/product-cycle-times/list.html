<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>제품별 사이클타임 분석</title>
</head>
<body>
<h1>제품별 사이클타임 분석</h1>

<a href="/">홈으로</a>
<a href="/analysis">병목 분석 대시보드</a>
<a href="/production-records">생산 실적 목록</a>

<table border="1">
  <thead>
  <tr>
    <th>제품번호</th>
    <th>공정 데이터 수</th>
    <th>총 사이클타임초</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="result : ${results}">
    <td th:text="${result.productSerialNo}">YYJ-000001</td>
    <td th:text="${result.recordCount}">3</td>
    <td th:text="${result.totalCycleTimeSeconds}">102.5</td>
  </tr>
  <tr th:if="${results.isEmpty()}">
    <td colspan="3">분석할 생산 실적 데이터가 없습니다.</td>
  </tr>
  </tbody>
</table>
</body>
</html>
